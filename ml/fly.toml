# Fly.io config for the ML service. Rename `app` to your chosen Fly app name.
# Deploy:  cd ml && fly launch --no-deploy  (adopt this file) && fly deploy
app = "wt-ml-9c685413"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  # Keep the machine ALWAYS on: the rest-push scheduler holds an in-process async
  # task that must survive to fire the notification at endsAt (BUGFIXES.md Web
  # Push). "off" disables idle auto-stop/suspend entirely — "stop"/"suspend" would
  # kill a pending push. Bonus: /predict no longer cold-starts. Revert to
  # auto_stop_machines="stop" + min_machines_running=0 to drop push + go free.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb" # numpy + scikit-learn need headroom
